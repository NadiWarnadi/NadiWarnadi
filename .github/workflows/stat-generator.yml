name: Generate GitHub Summary Cards

on:
  schedule:
    - cron: '0 */12 * * *' # Berjalan setiap 12 jam otomatis
  workflow_dispatch: # Bisa dijalankan manual via tombol

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # PERBAIKAN: Menggunakan nama pembuat yang benar (vn7n24fzkq)
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Pastikan Anda sudah membuat PAT di Settings repositori dengan nama TOKEN_KARTU
          GITHUB_TOKEN: ${{ secrets.TOKEN_KARTU }}
        with:
          USERNAME: NadiWarnadi
          THEME: calm

      # Menyimpan hasilnya ke folder repositori Anda otomatis
      - name: Commit & Push Gambar
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/ || true
          git commit -m "Ubah: Perbarui gambar statistik otomatis" || true
          git push || true
