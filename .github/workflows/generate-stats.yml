name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '0 */6 * * *' # Berjalan otomatis setiap 6 jam
  workflow_dispatch: # Memungkinkan Anda menjalankan manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          token: ${{ secrets.STAT_TOKEN }}
          path: profile/stats.svg
          options: theme=radical&show_icons=true

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          token: ${{ secrets.STAT_TOKEN }}
          path: profile/top-langs.svg
          options: theme=radical&layout=compact

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: Update GitHub Readme Stats" || exit 0
          git push
